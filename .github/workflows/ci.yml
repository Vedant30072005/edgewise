name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-${{ github.run_id }}
          ADMIN_EMAIL: admin@ci.test
          ADMIN_PASSWORD: CiAdmin123!
          DATA_DIR: /tmp/edgewise-ci-${{ github.run_id }}
        run: npm test

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node${{ matrix.node }}
          path: /tmp/edgewise-ci-*/
          retention-days: 3

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high + critical only)
        # Fails the build if any high or critical severity vulnerability is found.
        # Run `npm audit fix` locally to resolve, or `npm audit` to review.
        run: npm audit --audit-level=high
