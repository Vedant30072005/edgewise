<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Edgewise</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="/" aria-label="Edgewise home">
      <svg viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="24" height="24" stroke="currentColor" stroke-width="2"/><path d="M4 19 L10 12 L14 15 L22 5" stroke="#2323E6" stroke-width="2.4" fill="none"/><circle cx="22" cy="5" r="2.4" fill="#2323E6"/></svg>
      Edgewise
    </a>
    <nav class="nav__right" aria-label="Account">
      <a href="/register">Create account</a>
    </nav>
  </div>
</header>

<main class="auth">
  <div class="auth__card">
    <p class="auth__eyebrow">Session open</p>
    <h1 class="display">Sign in.</h1>
    <p class="auth__sub">Back to the log. The market doesn't wait, but your journal does.</p>

    <p class="form-error" id="err" role="alert"></p>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn btn--ultra" id="submit" style="width:100%">Sign in</button>
    <p style="text-align:right;margin-top:10px"><a href="/forgot-password" style="font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;color:var(--ink-faint);border-bottom:1px solid currentColor;padding-bottom:1px">Forgot password?</a></p>

    <p class="auth__alt">No account yet? <a href="/register">Open your journal free</a></p>
  </div>
</main>

<script src="/shared.js"></script>
<script src="/login.js"></script>
</body>
</html>
