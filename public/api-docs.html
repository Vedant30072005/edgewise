<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Reference — Edgewise</title>
<link rel="stylesheet" href="/app.css">
<style>
.api-wrap{max-width:960px;margin:0 auto;padding:24px var(--gutter) 80px}
.api-intro{margin:20px 0 36px;color:var(--ink-soft);font-size:15.5px;max-width:64ch}
.api-group{margin-top:36px}
.api-group-title{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);
  display:flex;align-items:center;gap:10px;margin-bottom:16px}
.api-group-title::before{content:"";width:24px;height:2px;background:var(--ultra)}
.api-endpoint{border:1.5px solid var(--ink);border-radius:var(--radius);background:var(--surface);margin-bottom:12px;overflow:hidden}
.api-endpoint summary{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;list-style:none;
  font-family:var(--font-mono);font-size:14px;transition:background var(--t-fast)}
.api-endpoint summary:hover{background:var(--chalk-deep)}
.api-endpoint summary::-webkit-details-marker{display:none}
.api-endpoint[open] summary{border-bottom:1px solid var(--line)}
.method{display:inline-block;padding:3px 8px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;min-width:52px;text-align:center;color:#fff}
.method-get{background:var(--win)}.method-post{background:var(--ultra)}.method-put{background:#D97706}
.method-delete{background:var(--loss)}.method-patch{background:#7C3AED}
.api-path{flex:1;color:var(--ink)}
.api-summary{color:var(--ink-soft);font-family:var(--font-body);font-size:13.5px}
.api-body{padding:16px 18px;font-size:14px}
.api-body h4{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:14px 0 8px}
.api-body h4:first-child{margin-top:0}
.api-status{display:inline-block;padding:2px 7px;border-radius:2px;font-family:var(--font-mono);font-size:12px;font-weight:600;margin-right:8px}
.api-status-2{background:rgba(11,124,85,.15);color:var(--win)}
.api-status-4{background:rgba(206,43,29,.1);color:var(--loss)}
.api-status-5{background:rgba(206,43,29,.15);color:var(--loss)}
.api-response{margin:4px 0 8px;font-size:13px;color:var(--ink-soft)}
.api-param-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
.api-param-table th{text-align:left;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-faint);padding:6px 0;border-bottom:1px solid var(--line)}
.api-param-table td{padding:6px 12px 6px 0;border-bottom:1px dashed var(--line);color:var(--ink-soft);vertical-align:top}
.api-param-table td:first-child{font-family:var(--font-mono);color:var(--ink);font-weight:600}
.api-param-table .required{color:var(--loss);font-size:10px;font-weight:600;margin-left:4px}
.api-schema{background:var(--chalk-deep);border-radius:2px;padding:12px 14px;font-family:var(--font-mono);font-size:12.5px;
  line-height:1.6;overflow-x:auto;white-space:pre;margin:6px 0 10px;color:var(--ink-soft)}
.api-auth-note{font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);
  border:1px dashed var(--line-strong);border-radius:var(--radius);padding:12px 16px;margin-top:20px}
</style>
</head>
<body>
<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="/" aria-label="Edgewise home">
      <svg viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="24" height="24" stroke="#101019" stroke-width="2"/><path d="M4 19 L10 12 L14 15 L22 5" stroke="#2323E6" stroke-width="2.4" fill="none"/><circle cx="22" cy="5" r="2.4" fill="#2323E6"/></svg>
      Edgewise
    </a>
    <nav class="nav__right" aria-label="Account">
      <a href="/app">My journal</a>
    </nav>
  </div>
</header>

<main class="api-wrap">
  <div class="page-head">
    <div>
      <p class="mono">OpenAPI 3.0 reference</p>
      <h1 class="display">The API.</h1>
    </div>
  </div>
  <p class="api-intro">
    All endpoints require cookie-based authentication (the <code>ew_token</code> cookie set at login)
    unless noted otherwise. Responses are JSON. The spec is also available as raw
    <a href="/swagger.json" style="color:var(--ultra);border-bottom:1px solid currentColor">swagger.json</a>.
  </p>
  <div id="apiContent"><p class="mono" style="color:var(--ink-faint)">Loading spec…</p></div>
</main>

<script>
(async function(){
  const spec = await fetch('/swagger.json').then(r => r.json());
  const container = document.getElementById('apiContent');

  // Group endpoints by tag
  const groups = {};
  for (const [path, methods] of Object.entries(spec.paths)) {
    for (const [method, op] of Object.entries(methods)) {
      const tag = (op.tags && op.tags[0]) || 'Other';
      if (!groups[tag]) groups[tag] = [];
      groups[tag].push({ path, method, ...op });
    }
  }

  function renderParams(params) {
    if (!params || !params.length) return '';
    return `<h4>Parameters</h4><table class="api-param-table"><thead><tr><th>Name</th><th>In</th><th>Type</th><th>Description</th></tr></thead><tbody>`
      + params.map(p => `<tr><td>${p.name}${p.required ? '<span class="required">REQ</span>' : ''}</td><td>${p.in}</td><td>${p.schema?.type || '—'}${p.schema?.enum ? ' [' + p.schema.enum.join(', ') + ']' : ''}${p.schema?.default != null ? ' = ' + p.schema.default : ''}</td><td>${p.description || ''}</td></tr>`).join('')
      + '</tbody></table>';
  }

  function renderBody(rb) {
    if (!rb) return '';
    const schema = rb.content?.['application/json']?.schema;
    if (!schema?.properties) return '<h4>Request body</h4><p class="api-response">JSON body required</p>';
    const props = Object.entries(schema.properties);
    const reqs = new Set(schema.required || []);
    return `<h4>Request body</h4><table class="api-param-table"><thead><tr><th>Field</th><th>Type</th><th>Details</th></tr></thead><tbody>`
      + props.map(([k, v]) => `<tr><td>${k}${reqs.has(k) ? '<span class="required">REQ</span>' : ''}</td><td>${v.type || '—'}${v.enum ? ' [' + v.enum.join(', ') + ']' : ''}</td><td>${v.description || ''}${v.minLength ? 'min ' + v.minLength + ' chars' : ''}${v.minimum != null ? 'min ' + v.minimum : ''}</td></tr>`).join('')
      + '</tbody></table>';
  }

  function renderResponses(responses) {
    if (!responses) return '';
    return '<h4>Responses</h4>' + Object.entries(responses).map(([code, r]) => {
      const cls = code[0] === '2' ? '2' : code[0] === '4' ? '4' : '5';
      return `<p class="api-response"><span class="api-status api-status-${cls}">${code}</span>${r.description}</p>`;
    }).join('');
  }

  let html = '';
  for (const [tag, endpoints] of Object.entries(groups)) {
    html += `<div class="api-group"><p class="api-group-title">${tag}</p>`;
    for (const ep of endpoints) {
      html += `<details class="api-endpoint"><summary>
        <span class="method method-${ep.method}">${ep.method}</span>
        <span class="api-path">${ep.path}</span>
        <span class="api-summary">${ep.summary || ''}</span>
      </summary><div class="api-body">
        ${renderParams(ep.parameters)}${renderBody(ep.requestBody)}${renderResponses(ep.responses)}
      </div></details>`;
    }
    html += '</div>';
  }
  html += `<p class="api-auth-note">AUTH: Cookie-based · <code>ew_token</code> httpOnly · Set on login · 7-day expiry · SameSite=Lax</p>`;
  container.innerHTML = html;
})();
</script>
</body>
</html>
