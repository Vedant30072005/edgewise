<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — Edgewise</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="/" aria-label="Edgewise home">
      <svg viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="24" height="24" stroke="currentColor" stroke-width="2"/><path d="M4 19 L10 12 L14 15 L22 5" stroke="#2323E6" stroke-width="2.4" fill="none"/><circle cx="22" cy="5" r="2.4" fill="#2323E6"/></svg>
      Edgewise
    </a>
    <nav class="nav__right" aria-label="Account">
      <a href="/login">Sign in</a>
    </nav>
  </div>
</header>

<main class="auth">
  <div class="auth__card">
    <p class="auth__eyebrow">Account recovery</p>
    <h1 class="display">Reset.</h1>
    <p class="auth__sub">Enter your email and we'll send a reset link. Check your spam folder if it doesn't arrive in a minute.</p>

    <p class="form-error" id="err" role="alert"></p>
    <p class="form-ok" id="ok" role="status"></p>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required>
    </div>
    <button class="btn btn--ultra" id="submit" style="width:100%">Send reset link</button>

    <p class="auth__alt">Remembered it? <a href="/login">Sign in</a></p>
  </div>
</main>

<script src="/shared.js"></script>
<script src="/forgot-password.js"></script>
</body>
</html>
