<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Edgewise</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="/" aria-label="Edgewise home">
      <svg viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="24" height="24" stroke="#101019" stroke-width="2"/><path d="M4 19 L10 12 L14 15 L22 5" stroke="#2323E6" stroke-width="2.4" fill="none"/><circle cx="22" cy="5" r="2.4" fill="#2323E6"/></svg>
      Edgewise
    </a>
    <nav class="nav__right" aria-label="Account">
      <a href="/login">Sign in</a>
    </nav>
  </div>
</header>

<main class="auth">
  <div class="auth__card">
    <p class="auth__eyebrow">Ticket / 01 — Paper</p>
    <h1 class="display">Open your journal.</h1>
    <p class="auth__sub">Free for your first 30 trades a month. No card. Your data exports as CSV any day you want.</p>

    <p class="form-error" id="err" role="alert"></p>

    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" autocomplete="name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" required>
      <p class="hint">8 characters minimum. A password manager beats a memorable one.</p>
    </div>
    <button class="btn btn--ultra" id="submit" style="width:100%">Create account</button>

    <p class="auth__alt">Already logging? <a href="/login">Sign in</a></p>
  </div>
</main>

<script src="/shared.js"></script>
<script>
const err = document.getElementById('err');
const btn = document.getElementById('submit');

async function submit() {
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    await api.post('/api/auth/register', {
      name: document.getElementById('name').value.trim(),
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    });
    window.location.href = '/app';
  } catch (e) {
    err.textContent = e.message; err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Create account';
  }
}
btn.addEventListener('click', submit);
document.querySelectorAll('input').forEach(i =>
  i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
</script>
</body>
</html>
