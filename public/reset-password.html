<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Edgewise</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="/" aria-label="Edgewise home">
      <svg viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="24" height="24" stroke="#101019" stroke-width="2"/><path d="M4 19 L10 12 L14 15 L22 5" stroke="#2323E6" stroke-width="2.4" fill="none"/><circle cx="22" cy="5" r="2.4" fill="#2323E6"/></svg>
      Edgewise
    </a>
  </div>
</header>

<main class="auth">
  <div class="auth__card" id="formCard">
    <p class="auth__eyebrow">New password</p>
    <h1 class="display">Choose one.</h1>
    <p class="auth__sub">Pick something you won't forget. 8 characters minimum — a password manager beats a memorable one.</p>

    <p class="form-error" id="err" role="alert"></p>

    <div class="field">
      <label for="password">New password</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" required>
    </div>
    <div class="field">
      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" autocomplete="new-password" minlength="8" required>
    </div>
    <button class="btn btn--ultra" id="submit" style="width:100%">Set new password</button>
  </div>

  <div class="auth__card" id="expiredCard" style="display:none">
    <p class="auth__eyebrow">Link expired</p>
    <h1 class="display">Too late.</h1>
    <p class="auth__sub">This reset link has expired or already been used. Reset links are valid for 1 hour.</p>
    <a href="/forgot-password" class="btn btn--ultra" style="width:100%;margin-top:18px;display:flex">Request a new link</a>
  </div>
</main>

<script src="/shared.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { document.getElementById('formCard').style.display = 'none'; document.getElementById('expiredCard').style.display = ''; }

const err = document.getElementById('err');
const btn = document.getElementById('submit');

async function submit() {
  err.classList.remove('show');
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (password !== confirm) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await api.post('/api/auth/reset-password', { token, password });
    toast('Password updated — sign in with your new password.');
    setTimeout(() => { window.location.href = '/login'; }, 1500);
  } catch (e) {
    if (e.message.includes('expired') || e.message.includes('used')) {
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('expiredCard').style.display = '';
    } else {
      err.textContent = e.message; err.classList.add('show');
      btn.disabled = false; btn.textContent = 'Set new password';
    }
  }
}
btn?.addEventListener('click', submit);
document.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
</script>
</body>
</html>
