<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Edgewise</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="/" aria-label="Edgewise home">
      <svg viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="1" width="24" height="24" stroke="currentColor" stroke-width="2"/><path d="M4 19 L10 12 L14 15 L22 5" stroke="#2323E6" stroke-width="2.4" fill="none"/><circle cx="22" cy="5" r="2.4" fill="#2323E6"/></svg>
      Edgewise
    </a>
    <nav class="nav__right" aria-label="Account">
      <span class="nav__user" id="navUser"></span>
      <a href="/app">My journal</a>
      <button id="logoutBtn">Log out</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <div class="page-head">
    <div>
      <p class="mono">Desk control — admin only</p>
      <h1 class="display">The desk.</h1>
    </div>
    <p class="mono" id="refreshNote"></p>
  </div>

  <!-- platform stats -->
  <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)" id="statGrid">
    <div class="stat-cell"><span class="mono">Accounts</span><strong id="sUsers">—</strong></div>
    <div class="stat-cell"><span class="mono">Active accounts</span><strong id="sActive">—</strong></div>
    <div class="stat-cell"><span class="mono">Trades logged</span><strong id="sTrades">—</strong></div>
    <div class="stat-cell"><span class="mono">Trades — last 7 days</span><strong id="sWeek">—</strong></div>
  </div>

  <!-- users -->
  <section class="panel">
    <div class="panel__head"><span>Accounts — newest first</span></div>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Plan</th><th>Status</th>
          <th>Trades</th><th>Net R</th><th>Last trade</th><th>Joined</th><th>Actions</th>
        </tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="/shared.js"></script>
<script src="/admin.js"></script>
</body>
</html>
